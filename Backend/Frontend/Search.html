<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search . SkillShare.me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/login.css">
    <!-- 2. Search-specific styles -->
    <link rel="stylesheet" href="/search.css">

</head>



<body>
    <nav class="topnav">
        <div class="topnav__inner">
            <a href="/dashboard" class="back-link" title="Back to dashboard">
        `        <span class="back-arrow">←</span>
                <span class="back-text">Dashboard</span>
            </a>

            <!-- Centre: brand -->
            <div class="nav-brand">
                <span class="logo-mark">◐</span>
                <span class="logo-word">SkillShare<span class="logo-dot">.me</span></span>
                </a>
            </div>
    </nav>


    <!--Search thing-->
    <section class="search-hero">
        <div class="search-hero__inner">

            <div class="search-hero__text">
                <h1>Find a skilled friend</h1>
                <p>Search by username to discover what people around you can do.</p>
            </div>

            <form id="formData" class="search-form" novalidate>
                <div class="search-input-wrap">
                    <span class="search-icon" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <label for="search" class="sr-only">Search by username</label>
                    <input type="text" id="search" name="search" placeholder="Search by username…" autocomplete="off"
                        spellcheck="false">
                    <button type="submit" class="btn-search">Search</button>
                </div>
            </form>

        </div>
    </section>
    <!--This is the searched list-->
    <!--JS renders -->
    <main id="searchedUser" class="results-section">
        <div class="idle-state">
            <span class="idle-icon">◐</span>
            <p>Type a username above and hit <strong>Search</strong></p>
        </div>

    </main>
</body>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }
    // getting the form data
    const formData = document.getElementById('formData');
    formData.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('search').value.trim();
        if (!username) {
            alert('Nothing entered — how are we gonna find your skilled friend?');
            return;
        }
        try {
            const response = await fetch(`/api/users/search?q=${username}`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const data = await response.json();
            if (response.ok) {

                renderSearchedUser(data);
            } else {
                alert(data.error);
            }
        } catch (err) {
            console.log(err.message);
        }
    });


    function renderSearchedUser(users) {
        const container = document.getElementById('searchedUser');

        container.innerHTML = '';
        if (users.length === 0) {
            container.innerHTML = `<p>No user found</p>`;
            return;
        }

        users.forEach(user => {
            const initial = user.username.charAt(0).toUpperCase();
            const item = document.createElement('div');
            item.className = 'searched-user';
            item.innerHTML = `
             <div class="searched">
                    <div class="searched-initial">${initial}</div>
                    <div class="searched-name">${user.username}</div>
                    <button id="add-friend-btn" class="add-friend-btn" data-user-id="${user.user_id}">Add Friend</button>
                </div>
            
            `;
            container.appendChild(item);

        });

    }

    // add-friend-btn is id for the button
    // When someone clicked the add-friend-btn
    const container = document.getElementById('searchedUser');

    container.addEventListener('click', async (e) => {
        if (!e.target.classList.contains('add-friend-btn')) return;

        const followingId = e.target.dataset.userId;

        try {
            const response = await fetch(`/api/follow/${followingId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const data = await response.json();

            if (response.ok) {
                e.target.textContent = 'Following ✓';
                e.target.disabled = true;
            } else {
                alert(data.error || 'Could not follow');
            }
        } catch (err) {
            console.log(err.message);
        }
    });


</script>

</html>
